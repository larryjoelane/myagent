<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MyAgent</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="title">MyAgent</span>
      <app-root></app-root>
      <!-- Topbar command buttons: Chat / + Terminal / + Browser / Close.
           Component renders into the light DOM so the existing .cmd-btn
           styles and the e2e test selectors (#cmd-new-shell etc) keep
           working. Emits chat-toggle / new-shell / new-browser /
           close-pane events. -->
      <topbar-commands close-pane-disabled></topbar-commands>
    </header>
    <div id="app-row">
    <aside id="agent-manager" class="agent-manager" aria-label="Chat">
      <div class="agent-manager__header">
        <span class="agent-manager__title">Chat</span>
        <button id="am-settings-toggle" class="agent-manager__icon-btn" type="button"
                title="Settings (memory mirror, workers)" aria-label="Settings">⚙</button>
        <button id="agent-manager-close" class="agent-manager__icon-btn" type="button"
                title="Hide chat" aria-label="Close">×</button>
      </div>

      <!-- Settings drawer: collapsible, hidden by default. Houses the
           mirror toggle and the worker management section. -->
      <!-- Settings drawer: collapsible, hidden by default. The
           component owns all knobs (mirror toggles, chat side, tool
           details, workers section, semantic device, explain model).
           Visibility is controlled by the [open] attribute — toggled
           by the gear-icon button via agentManager.js. The legacy
           --hidden class is kept on the host for back-compat with
           tests that check classList.contains(...). -->
      <settings-drawer id="am-settings" class="agent-manager__settings--hidden"></settings-drawer>

      <!-- Always-visible worker chip strip (only shown when workers exist).
           The component subscribes to the store and renders one chip per
           worker. Clicks dispatch a 'select' event which agentManager.js
           uses to focus the compose input. -->
      <worker-chips id="am-workers" aria-label="Attached workers"></worker-chips>

      <!-- Empty state — shown when no workers exist. The component
           lives in renderer/components/empty-state.js. It reads
           pendingCwd from the store and dispatches a 'spawn' event
           with detail.kind when the user clicks any spawn button.
           agentManager.js attaches one listener and routes through
           spawnWorker(kind). -->
      <empty-state id="am-empty-state"></empty-state>

      <!-- Chat surface — owns all bubbles (user, system, assistant with
           streaming text + tool cards + semantic cards), context badges,
           and the @memory bubble (appended as a sibling). The component
           keeps id="am-chat" so legacy queries via getElementById and
           e2e selectors that expect the .bubble--* classes in the
           document tree keep working. -->
      <chat-log class="agent-manager__chat" id="am-chat"></chat-log>

      <!-- Composer: textarea + mention/slash popup + send button. The
           component renders a `submit` event with detail.text whenever
           the user hits Enter or clicks Send; agentManager.js routes
           that to the existing send() flow. Programmatic API (value,
           appendValue, focus, clear) is used by send() and by memory-
           bubble click-to-insert. -->
      <compose-input id="am-compose"></compose-input>
    </aside>
    <div id="split-wrap" class="split-wrap--hidden">
    <div id="split">
      <!-- Main pane is retained for back-compat with the existing
           PaneManager wiring but visually hidden. The tabbed area below
           is the user-facing terminal surface. -->
      <div class="pane pane--legacy-hidden" data-pane="main">
        <div class="pane-host"></div>
      </div>
      <div id="splitter" class="splitter splitter--hidden" role="separator"
           aria-orientation="vertical" aria-label="Resize panes" tabindex="0"></div>
      <div class="pane pane--focused" data-pane="extra">
        <div class="tabs" id="tabs">
          <div class="tabs__list" id="tabs-list" role="tablist"></div>
          <button class="tabs__add" id="tabs-add" type="button" title="New shell tab (Ctrl+Shift+T)">+</button>
        </div>
        <div class="tabs-host" id="tabs-host"></div>
      </div>
    </div>
    </div><!-- /#split-wrap -->
    </div><!-- /#app-row -->
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
